<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Официальная страница InceptDevs где вы можете связаться с нами">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>InceptDevs - Contacts</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="all.css">
</head>
<body>
  <div class="container">
    <header>
      <a href="main-page" class="logo">incept<span>devs</span></a>
      <nav class="nav-links">
        <a href="main-page">Главная</a>
        <a href="contacts" class="active">Контакты</a>
      </nav>
    </header>

    <main>
      <div class="section-label">Связь</div>
      <h1>Контакты</h1>
      <div class="statement">
        Прямые ссылки для связи с нами.
      </div>

      <div class="contact-list">
        <div class="contact-item">
          <span class="contact-label">GitHub</span>
          <span class="contact-value"><a href="https://github.com/InceptDevs" target="_blank" rel="noopener noreferrer">Нажмите сюда</a></span>
        </div>
        <div class="contact-item">
          <span class="contact-label">Discord сервер</span>
          <span class="contact-value"><a href="https://discord.gg/28zcpFDuJU" target="_blank" rel="noopener noreferrer">Нажмите сюда</a></span>
        </div>
        <div class="contact-item">
          <span class="contact-label">Анкета в команду</span>
          <span class="contact-value"><a href="applications">Нажмите сюда</a></span>
        </div>
        <div class="contact-item">
          <span class="contact-label">Gmail</span>
          <span class="contact-value">
            <button onclick="toggleEmail(this)" style="background: none; border: none; color: #a8b2c1; cursor: pointer; font-size: inherit; font-family: inherit; padding: 0;">Показать</button>
            <span class="email-hidden" style="display: none; margin-left: 8px;">inceptdevs@gmail.com</span>
          </span>
        </div>
      </div>

      <hr>
    </main>

    <footer>
      <div>InceptDevs</div>
      <div class="footer-note">Just Developers</div>
    </footer>
  </div>

  <script>
    function toggleEmail(btn) {
      const emailSpan = btn.nextElementSibling;
      if (emailSpan.style.display === "none") {
        emailSpan.style.display = "inline";
        btn.textContent = "Скрыть";
      } else {
        emailSpan.style.display = "none";
        btn.textContent = "Показать";
      }
    }
  </script>
</body>
</html>

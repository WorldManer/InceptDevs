<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Официальная страница InceptDevs где вы можете связаться с нами">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>InceptDevs - Contacts</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="stylesheet" href="all.css">
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="logo">
        <img src="icon.png" alt="InceptDevs logo" class="logo-icon">incept<span>devs</span>
      </a>
      <nav class="nav-links">
        <a href="/">Главная</a>
        <a href="contacts" class="active">Контакты</a>
      </nav>
    </header>

    <main>
      <div class="section-label">Связь</div>
      <h1>Контакты</h1>
      <div class="statement">
        Прямые ссылки для связи с нами.
      </div>

      <div class="contact-list">
        <div class="contact-item">
          <span class="contact-label">GitHub</span>
          <span class="contact-value"><a href="https://github.com/InceptDevs" target="_blank" rel="noopener noreferrer">Нажмите сюда</a></span>
        </div>
        <div class="contact-item">
          <span class="contact-label">Discord сервер</span>
          <span class="contact-value"><a href="https://discord.gg/28zcpFDuJU" target="_blank" rel="noopener noreferrer">Нажмите сюда</a></span>
        </div>
        <div class="contact-item">
          <span class="contact-label">Анкета в команду</span>
          <span class="contact-value"><a href="applications">Нажмите сюда</a></span>
        </div>
        <div class="contact-item">
          <span class="contact-label">Gmail</span>
          <span class="contact-value" id="gmail-container">
            <a href="#" onclick="showEmail(event)" style="color: inherit; text-decoration: none;">Показать</a>
          </span>
        </div>
      </div>

      <hr>
    </main>

    <footer>
      <div>InceptDevs</div>
      <div class="footer-note">Just Developers</div>
    </footer>
  </div>

  <script>
    function showEmail(event) {
      event.preventDefault();
      const container = document.getElementById('gmail-container');
      container.innerHTML = 'inceptdevs@gmail.com';
    }
  </script>
</body>
</html>

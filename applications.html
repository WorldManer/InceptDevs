<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Официальная страница InceptDevs для подачи заявок в команду">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" href="icon.png">
    <title>InceptDevs - Applications</title>
    <link rel="stylesheet" href="all.css">
</head>
<body class="applications">
    <div class="container">
        <header>
            <a href="main-page" class="logo">incept<span>devs</span></a>
            <nav class="nav-links">
                <a href="main-page">Главная</a>
                <a href="contacts">Контакты</a>
                <a href="applications" class="active">Заявка</a>
            </nav>
        </header>

        <main>
            <div class="section-label">Присоединиться</div>
            <h1>Анкета</h1>
            <div class="statement">
                Заполните форму ниже, чтобы подать заявку в команду InceptDevs.
            </div>
            
            <div class="form-container">
                <div id="loading" class="loading">
                    Загрузка...
                </div>
                
                <form id="survey-form" style="display: none;">
                    <div class="form-group">
                        <label>1. Ваш Discord ник</label>
                        <input type="text" id="discord-nick" placeholder="username" required>
                    </div>
                    
                    <div class="form-group">
                        <label>2. Ссылка на ваш профиль GitHub</label>
                        <input type="url" id="github" placeholder="https://github.com/username" required>
                    </div>
                    
                    <div class="form-group">
                        <label>3. Какие языки программирования вы знаете?</label>
                        <input type="text" id="languages" placeholder="JavaScript, Python, C++..." required>
                    </div>

                    <div class="form-group">
                        <label>4. Сколько вам лет?</label>
                        <input type="number" id="age" min="1" max="120" required>
                    </div>

                    <div class="form-group">
                        <label>5. Готовы ли вы продемонстрировать свои проекты?</label>
                        <div class="radio-group">
                            <label><input type="radio" name="show-projects" value="Да" required> Да</label>
                            <label><input type="radio" name="show-projects" value="Нет"> Нет</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>6. Готовы ли вы пройти обзвон?</label>
                        <div class="radio-group">
                            <label><input type="radio" name="call" value="Да" required> Да</label>
                            <label><input type="radio" name="call" value="Нет"> Нет</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>7. Имеете ли вы микрофон?</label>
                        <div class="radio-group">
                            <label><input type="radio" name="microphone" value="Да" required> Да</label>
                            <label><input type="radio" name="microphone" value="Нет"> Нет</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>8. Насколько мощный у вас компьютер? (0-10)</label>
                        <input type="range" id="power" min="0" max="10" step="1" value="5">
                        <div class="range-value" id="power-value">5</div>
                    </div>

                    <div class="form-group">
                        <label>9. Ваш пол?</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="Мужской" required> Мужской</label>
                            <label><input type="radio" name="gender" value="Женский"> Женский</label>
                        </div>
                    </div>

                    <button type="submit" id="submit-btn">Отправить</button>
                    <div id="message" class="message"></div>
                </form>
            </div>
        </main>

        <footer>
            <div>InceptDevs</div>
            <div class="footer-note">Just Developers</div>
        </footer>
    </div>

    <script src="applications.js"></script>
</body>
</html>
